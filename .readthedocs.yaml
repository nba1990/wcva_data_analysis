version: 2

build:
  os: ubuntu-24.04
  apt_packages:
    - graphviz
  tools:
    python: "3.12"
  jobs:
    pre_build:
      - source .venv/bin/activate || true
      - python scripts/generate_diagrams.py

sphinx:
  configuration: docs/source/conf.py

python:
  install:
    - requirements: requirements.txt
    - requirements: docs/requirements-docs.txt
