[pytest]
# Test discovery
testpaths = tests
python_files = test_*.py
python_functions = test_*
python_classes = Test*

# Markers (e.g. for excluding e2e in CI)
markers =
    e2e: End-to-end or integration tests that may require Streamlit UI or external services (deselect with -m "not e2e").
    integration: Non-e2e integration tests that exercise multiple modules together (deselect with -m "not integration").

# Strict markers: fail if a test uses an unregistered mark
addopts = --strict-markers
