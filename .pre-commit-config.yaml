# Pre-commit hooks for WCVA Baromedr Dashboard
# Install: pip install pre-commit && pre-commit install
# Run manually: pre-commit run --all-files

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ["--maxkb=1000"]
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: ["--settings-path", "pyproject.toml"]

  - repo: local
    hooks:
      - id: black
        name: black
        entry: .venv/bin/black --config pyproject.toml
        language: system
        types_or: [python, pyi]
      - id: pytest
        name: pytest (non-e2e)
        entry: .venv/bin/pytest tests/ -m "not e2e" -q --tb=line
        language: system
        pass_filenames: false
      - id: mypy
        name: mypy (src + tests)
        entry: .venv/bin/mypy src/ tests/
        language: system
        pass_filenames: false
      # Optional: enable this hook locally for extra safety.
      # - id: pyupgrade
      #   name: pyupgrade (modernise syntax)
      #   entry: .venv/bin/pyupgrade --py311-plus
      #   language: system
      #   types: [python]
      - id: detect-secrets
        name: detect-secrets (scan for secrets)
        entry: .venv/bin/detect-secrets-hook --baseline .secrets.baseline
        language: system
        pass_filenames: true
