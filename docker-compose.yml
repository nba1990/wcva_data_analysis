services:
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    image: wcva-baromedr-dashboard:latest
    container_name: wcva-baromedr-dashboard
    ports:
      - "8501:8501"
    environment:
      # Set to 1 (or true/yes) to show process memory in the sidebar
      - WCVA_DEBUG_MEMORY=${WCVA_DEBUG_MEMORY:-0}
    # Optional: mount private runtime data and references instead of baking them in
    # volumes:
    #   - ./runtime-data:/app/runtime-data:ro
    #   - ./references:/app/references:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8501/_stcore/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

